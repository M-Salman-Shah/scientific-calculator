<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Calculator</title>
    <link rel="stylesheet" href="style.css">
    
</head>

<body>
    <div class="calculator">
        <input type="text" id="display" class="calculator-display" disabled value="0">
        <div class="calculator-buttons">
            <!-- Row 1 -->
            <button class="btn function">Rad</button>
            <button class="btn function">Deg</button>
            <button class="btn function">x!</button>
            <button class="btn symbol" value="(">(</button>
            <button class="btn symbol" value=")">)</button>
            <button class="btn symbol" value="%">%</button>
            <button class="btn clear" value="clear">AC</button>

            <!-- Row 2 -->
            <button class="btn function">Inv</button>
            <button class="btn function">sin</button>
            <button class="btn function">ln</button>
            <button class="btn number" value="7">7</button>
            <button class="btn number" value="8">8</button>
            <button class="btn number" value="9">9</button>
            <button class="btn operator" value="/">÷</button>

            <!-- Row 3 -->
            <button class="btn function">π</button>
            <button class="btn function">cos</button>
            <button class="btn function">log</button>
            <button class="btn number" value="4">4</button>
            <button class="btn number" value="5">5</button>
            <button class="btn number" value="6">6</button>
            <button class="btn operator" value="*">×</button>

            <!-- Row 4 -->
            <button class="btn function">e</button>
            <button class="btn function">tan</button>
            <button class="btn function">√</button>
            <button class="btn number" value="1">1</button>
            <button class="btn number" value="2">2</button>
            <button class="btn number" value="3">3</button>
            <button class="btn operator" value="-">-</button>

            <!-- Row 5 -->
            <button class="btn function">Ans</button>
            <button class="btn function">EXP</button>
            <button class="btn function">x^</button>
            <button class="btn number" value="0">0</button>
            <button class="btn symbol" value=".">.</button>
            <button class="btn equals" value="equals">=</button>
            <button class="btn operator" value="+">+</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
